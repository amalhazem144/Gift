    :root{
      --bg1:#070914;
      --bg2:#120a1f;
      --gold:#d7b46a;
      --gold2:#b99249;
      --paper:#f8f2e7;
      --paper2:#f3eadb;
      --ink:#181818;
      --shadow:0 10px 30px rgba(0,0,0,.52);
      --soft:0 14px 35px rgba(0,0,0,.35);
      --sheet-w:min(880px,96vw);
      --sheet-h:min(580px,74vh);
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      min-height:100vh;
      font-family:"Noto Naskh Arabic",system-ui,-apple-system,Segoe UI,Arial,sans-serif;
      background:
        radial-gradient(1000px 700px at 20% 20%, rgba(215,180,106,.12), transparent 60%),
        radial-gradient(850px 600px at 80% 30%, rgba(255,255,255,.06), transparent 55%),
        linear-gradient(135deg, var(--bg1), var(--bg2));
      color:#fff;
      overflow:hidden;
      touch-action:manipulation;
      -webkit-tap-highlight-color:transparent;
    }

    .screen{min-height:100vh;display:grid;place-items:center;padding:24px}
    #bookScreen{display:none}
    body.show-book #homeScreen{display:none}
    body.show-book #bookScreen{display:grid}

    .intro{
      width:min(1080px,100%);
      border-radius:28px;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.10);
      box-shadow:var(--shadow);
      padding:min(58px,6vw);
      position:relative;
      overflow:hidden;
      min-height:min(560px,70vh);
      display:grid;
      place-items:center;
      text-align:center;
    }
    .intro::before{
      content:"";
      position:absolute; inset:-2px;
      background:
        radial-gradient(720px 360px at 18% 0%, rgba(215,180,106,.24), transparent 62%),
        radial-gradient(780px 420px at 82% 100%, rgba(255,255,255,.10), transparent 62%),
        linear-gradient(180deg, rgba(0,0,0,.15), transparent 40%);
      pointer-events:none;
    }

    .intro-stack{position:relative;z-index:2;display:grid;gap:18px;justify-items:center;max-width:70ch}
    .line{
            opacity:0;
            transform:translateY(30px) scale(0.96);
            filter:blur(8px);
            animation:cinematicIn 1.2s cubic-bezier(.2,.8,.2,1) forwards;
          }
          @keyframes cinematicIn{
                                0%{
                                  opacity:0;
                                  transform:translateY(40px) scale(0.94);
                                  filter:blur(12px);
                                }
                                60%{
                                  opacity:1;
                                  transform:translateY(-5px) scale(1.02);
                                  filter:blur(2px);
                                }
                                100%{
                                  opacity:1;
                                  transform:translateY(0) scale(1);
                                  filter:blur(0);
                                }
                              }
    @keyframes in{to{opacity:1;transform:translateY(0);filter:blur(0)}}
    .title{margin:0;font-family:"Aref Ruqaa","Amiri",serif;font-size:clamp(44px,6vw,84px);letter-spacing:.6px;line-height:1.12;text-shadow:0 14px 40px rgba(0,0,0,.45)}
    .gold-line{width:min(520px,76%);height:1px;background:linear-gradient(90deg, transparent, rgba(215,180,106,.95), transparent);opacity:.9}
    .dedication{margin:0;font-size:clamp(16px,2.2vw,20px);line-height:2;opacity:.92}
    .small{margin:0;font-size:14px;opacity:.82;line-height:1.9}
    .t1{animation-delay:.35s}.t2{animation-delay:1.35s}.t3{animation-delay:2.25s}.t4{animation-delay:3.20s}
    .to-book{
      margin-top:10px;
      padding:14px 22px;
      border-radius:999px;
      border:1px solid rgba(215,180,106,.70);
      background:linear-gradient(135deg, rgba(215,180,106,.30), rgba(255,255,255,.06));
      color:#fff;
      font-weight:900;

      opacity:0;
      transform:translateY(30px) scale(0.9);
      animation:btnCinematic 1s ease forwards;
      animation-delay:3.8s;
    }
    @keyframes btnCinematic{
      0%{
        opacity:0;
        transform:translateY(40px) scale(0.8);
      }
      100%{
        opacity:1;
        transform:translateY(0) scale(1);
      }
    }
        .title{
      text-shadow:
        0 0 10px rgba(215,180,106,.3),
        0 10px 30px rgba(0,0,0,.5);
    }
    @keyframes btnShow{to{opacity:1;transform:translateY(0)}}

    .book-wrap{width:min(1100px,100%);display:grid;gap:16px;place-items:center}
    .topbar{width:min(980px,100%);display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap}
    .back,.navbtn{
      color:rgba(255,255,255,.92);text-decoration:none;border:1px solid rgba(255,255,255,.18);padding:10px 14px;
      border-radius:999px;background:rgba(255,255,255,.06);cursor:pointer;font:inherit
    }
    .note{opacity:.9;font-size:14px;margin:0;text-align:center;flex:1}

    .stage{width:var(--sheet-w);height:var(--sheet-h);perspective:1900px;position:relative}
    .tap-hint{
      position:absolute;top:16px;right:18px;font-size:12px;opacity:.75;background:rgba(0,0,0,.25);
      border:1px solid rgba(255,255,255,.12);padding:8px 10px;border-radius:999px;backdrop-filter:blur(8px);z-index:40
    }

    .book{width:100%;height:100%;position:relative;transform-style:preserve-3d;filter:drop-shadow(0 40px 55px rgba(0,0,0,.45))}

    .sheet{
      position:absolute;inset:0;transform-style:preserve-3d;transform-origin:right center;
      transition:transform 900ms cubic-bezier(.2,.75,.12,1), box-shadow 900ms;
      border-radius:20px;overflow:hidden;box-shadow: 0 8px 18px rgba(0,0,0,.12);
      border:1px solid rgba(0,0,0,.14);background:var(--paper)
    }
    .sheet.flipped{transform:rotateY(-180deg);box-shadow:0 10px 26px rgba(0,0,0,.18)}

    .face{position:absolute;inset:0;padding:min(38px,4.2vw);display:flex;flex-direction:column;justify-content:center;gap:14px;color:var(--ink)}
    .front{backface-visibility:hidden;-webkit-backface-visibility:hidden}
    .backside{
      transform:rotateY(180deg);backface-visibility:hidden;-webkit-backface-visibility:hidden;
      background:
        radial-gradient(900px 500px at 20% 0%, rgba(0,0,0,.03), transparent 65%),
        linear-gradient(180deg, rgba(0,0,0,.03), transparent 30%),
        var(--paper)
    }
    .paper{
      background:
        radial-gradient(1200px 650px at 25% 0%, rgba(215,180,106,.10), transparent 62%),
        radial-gradient(900px 520px at 80% 100%, rgba(0,0,0,.05), transparent 60%),
        linear-gradient(180deg, rgba(255,255,255,.35), transparent 35%),
        var(--paper)
    }
    .sheet::after{
      content:"";position:absolute;inset:0;pointer-events:none;
      background:linear-gradient(90deg, rgba(0,0,0,.08) 0%, rgba(0,0,0,0) 16%, rgba(0,0,0,0) 84%, rgba(0,0,0,.10) 100%);
      mix-blend-mode:multiply;opacity:.35
    }

    .cover{
      background:
        radial-gradient(700px 420px at 30% 18%, rgba(215,180,106,.22), transparent 62%),
        radial-gradient(820px 520px at 80% 80%, rgba(255,255,255,.08), transparent 64%),
        linear-gradient(135deg, rgba(20,20,30,.96), rgba(10,8,18,.98));
      border:1px solid rgba(215,180,106,.40)
    }
    .cover .front,.cover .backside{color:#fff}
    .cover .backside{background:linear-gradient(135deg, rgba(20,20,30,.96), rgba(10,8,18,.98))}
    .cover-title{ font-family:"Aref Ruqaa","Amiri",serif; font-size: clamp(38px, 5.2vw, 72px);  margin:0; letter-spacing:.6px; text-align:center; color:#ffffff; text-shadow:0 6px 25px rgba(0,0,0,.6);}
    .cover-sub{ margin:0; text-align:center; opacity:.95; line-height:1.95; font-size: clamp(14px, 2vw, 18px); color:#f4e6c3;}
    .page-title{font-weight:900;margin:0;font-size:18px;letter-spacing:.2px;opacity:.92;text-align:center}
    .page-num{position:absolute;bottom:14px;left:16px;font-size:12px;opacity:.55}
    .poem{font-family:"Amiri","Noto Naskh Arabic",serif;font-size:clamp(16px,2.1vw,22px);line-height:2.08;white-space:pre-line;text-align:center}
    .blank-box{
      height:100%;width:100%;border:2px dashed rgba(0,0,0,.12);border-radius:16px;display:flex;align-items:center;justify-content:center;
      text-align:center;padding:24px;font-size:22px;line-height:2;color:rgba(0,0,0,.42);background:rgba(255,255,255,.18)
    }
    .image-box{
      width:fit-content;
      max-width:80%;
      height:auto;
      min-height:unset;
      border-radius:16px;
      background:white;
      box-shadow:0 10px 28px rgba(0,0,0,.12); 
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
      padding:12px;
      margin:auto;
      border:1px solid rgba(0,0,0,.06);
    }
    .page-image{
      max-width:420px;
      width:100%;
      height:auto;
      object-fit:contain;
      border-radius:12px;
      display:block;
    }
    .image-box.has-image{color:transparent}

    .zones{
      position:absolute;
      inset:0;
      display:grid;
      grid-template-columns: 1fr 1fr;
      z-index: 50;
      pointer-events:none;
    }

    .zone{
      pointer-events:auto;
      cursor:pointer;
    }

    @media (max-width:540px){
      .screen{padding:14px}
      .face{padding:18px}
      .note,.tap-hint{display:none}
      .topbar{justify-content:center}
      .poem{font-size:18px}
      .blank-box,.image-box{font-size:15px}
    }

    .candles{
      position:absolute;
      top:-18px;
      z-index:3;
      width:180px;
      display:flex;
      justify-content:space-between;
      align-items:flex-end;
      }

  height:100%;

  .cake-wrap{

  .cake-glow{

      0 0 18px rgba(255,220,150,.28),

  }

  .candles{
    position:absolute;
    top:-18px;
    z-index:3;
    width:180px;
    display:flex;
    justify-content:space-between;
    align-items:flex-end;
  }

  .candle{
    position:relative;
    width:10px;
    height:34px;
    border-radius:4px;
    background:linear-gradient(180deg, #fff6d8, #f2d48b);
    box-shadow:0 0 8px rgba(255,240,180,.35);
  }

  .flame{
    position:absolute;
    left:50%;
    top:-14px;
    transform:translateX(-50%);
    width:10px;
    height:16px;
    border-radius:50% 50% 50% 50%;
    background:radial-gradient(circle at 50% 35%, #fff8d6 0%, #ffd36b 45%, #ff9f1c 78%, rgba(255,159,28,.25) 100%);

      0 0 10px rgba(255,210,90,.9),
      0 0 22px rgba(255,180,50,.55);
  }

  .candle:nth-child(2) .flame{ animation-duration:1.3s; animation-delay:.2s; }
  .candle:nth-child(3) .flame{ animation-duration:1s; animation-delay:.15s; }
  .candle:nth-child(4) .flame{ animation-duration:1.25s; animation-delay:.08s; }
  .candle:nth-child(5) .flame{ animation-duration:1.15s; animation-delay:.18s; }

  .cake-text{
    font-family:"Amiri", serif;
    font-size:26px;
    line-height:2;
    color:#221b12;
    text-shadow:
      0 0 8px rgba(255,228,170,.20),
      0 1px 0 rgba(255,255,255,.45);
  }

  @keyframes cakePulse{
    0%,100%{ transform:scale(1); opacity:.72; }
    50%{ transform:scale(1.08); opacity:1; }
  }

  @keyframes cakeFloat{
    0%,100%{ transform:translateY(0); }
    50%{ transform:translateY(-6px); }
  }

  @keyframes flicker{
    0%{ transform:translateX(-50%) scale(1) rotate(-2deg); opacity:.95; }
    25%{ transform:translateX(-50%) scale(1.06,.96) rotate(2deg); opacity:1; }
    50%{ transform:translateX(-50%) scale(.96,1.08) rotate(-1deg); opacity:.92; }
    75%{ transform:translateX(-50%) scale(1.04,.98) rotate(1deg); opacity:1; }
    100%{ transform:translateX(-50%) scale(.98,1.04) rotate(-2deg); opacity:.94; }
  }

  @keyframes textGlow{
    0%,100%{ opacity:1; transform:translateY(0); }
    50%{ opacity:.96; transform:translateY(-2px); }
  }

  @media (max-width:540px){
    .cake-image{ width:180px; }
    .candles{ width:145px; top:-14px; }

<script>
const couplets = [
  ["شَكَوْتُ لِنَجْمٍ فِي السَّمَاءِ عَذَابِيَا", "أُسَائِلُهُ مَا ضَرَّ لَوْ كُنْتُ خَالِيَا"],
  ["يُسَامِرُنِي كُلَّ اللَّيَالِي بِطُولِهَا", "وَمَا ضَرَّ لَوْ كَانَ الحَبِيبُ جِوَارِيَا"],
  ["يَقُولُ أَنَّ الحُبَّ ضَرْبُ جُنُونِيَا", "وَيُخْبِرُنِي أَنَّ الهَوَى مَرَضٌ بِيَا"],

const book = document.getElementById('book');
const body = document.body;
let current = 0; // 0 = الغلاف

function faceHTML(page, pageNum){
  if(page.kind === 'cover'){
    return `
      <div class="face front cover">
        <h1 class="cover-title">عيد ميلاد سعيد</h1>
        <p class="cover-sub">هذا الكتاب إهداء لِآمال... <br> التي لطالما كانت الاقرب الى قلبي  </p>
        <p class="cover-sub">بحبٍّ يليق بك</p>
      </div>
      <div class="face backside cover"></div>
    `;
  }

  let inner = '';

  if(page.kind === 'blank'){
    inner = `
      <h3 class="page-title">${page.title || ''}</h3>
      <div class="blank-box">${(page.text || '').replace(/\n/g,'<br>')}</div>
    `;
  }
  else if(page.kind === 'cake'){
    inner = `
      <div class="cake-page">
        <div class="cake-wrap">
          <div class="cake-glow"></div>

          <img src="./imges/cake.webp" class="cake-image" loading="lazy" alt="cake">
        </div>

        <div class="cake-text">
          وُلِدَ الجمالُ يومَ وُلِدتِ يا آمال<br>
          14 / 4 / 2006<br>
          14 / 4 / 2026
        </div>
      </div>
    `;
  }
  else if(page.kind === 'image'){
    const has = (page.src || '').trim() !== '';
    inner = `
      <h3 class="page-title">صورة ${page.num || ''}</h3>
      <div class="image-box ${has ? 'has-image' : ''}">
        ${has
          ? `<img src="${page.src}" class="page-image" loading="lazy" alt="صورة ${page.num || ''}">`
          : 'ضع الصورة هنا'}
      </div>
    `;
  }
  else if(page.kind === 'poem'){
    const txt = (page.couplets || []).map(c => `${c[0]}\n${c[1]}`).join('\n\n');
    inner = `
      <h3 class="page-title">${page.title || 'قصيدة'}</h3>
      <div class="poem">${txt}</div>
    `;
  }

  return `
    <div class="face front paper">
      ${inner}
      <span class="page-num">${pageNum}</span>
    </div>
    <div class="face backside paper"></div>
  `;
}

function renderBook(){
  book.querySelectorAll('.sheet').forEach(el=>el.remove());
  for(let i=pages.length-1;i>=0;i--){
    const sheet = document.createElement('div');
    sheet.className = 'sheet' + (i <= current-1 ? ' flipped' : '');
    sheet.style.zIndex = String(pages.length - i + 1);
    sheet.innerHTML = faceHTML(pages[i], i === 0 ? 'غلاف' : i);
    book.appendChild(sheet);
  }
}

function updateFlipStates(){
  const sheets = [...book.querySelectorAll('.sheet')].reverse();
  sheets.forEach((sheet, index)=>{
    if(index <= current-1) sheet.classList.add('flipped');
    else sheet.classList.remove('flipped');
  });
}

function nextPage(){
  if(current >= pages.length-1) return;
  current += 1;
  updateFlipStates();
}
function prevPage(){
  if(current <= 0) return;
  current -= 1;
  updateFlipStates();
}

renderBook();

document.getElementById('openBook').addEventListener('click', ()=>{
  body.classList.add('show-book');
});
document.getElementById('backHome').addEventListener('click', ()=>{
  body.classList.remove('show-book');
});
document.getElementById('nextBtn').addEventListener('click', nextPage);
document.getElementById('prevBtn').addEventListener('click', prevPage);
document.getElementById('rightZone').addEventListener('click', nextPage);
document.getElementById('leftZone').addEventListener('click', prevPage);

document.addEventListener('keydown', (e)=>{
  if(!body.classList.contains('show-book')) return;
  if(e.key === 'ArrowLeft') nextPage();
  if(e.key === 'ArrowRight') prevPage();
  if(e.key === 'Escape') body.classList.remove('show-book');
});

let sx = 0;
book.addEventListener('touchstart', e=>{ sx = e.changedTouches[0].clientX; }, {passive:true});
book.addEventListener('touchend', e=>{
  const dx = e.changedTouches[0].clientX - sx;
  if(Math.abs(dx) < 40) return;
  if(dx < 0) nextPage(); else prevPage();
}, {passive:true});
</script>
</body>
